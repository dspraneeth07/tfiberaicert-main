[build]
  command = "npm install && npm run build"
  publish = "dist/client"
  functions = "dist/server"

[build.environment]
  NODE_VERSION = "22.0.0"
  NODE_ENV = "production"
  FORCE_COLOR = "1"

# Route all requests through the server function for SSR
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/index"
  status = 200

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
